<!DOCTYPE html>
<style>
    :root {
        --title-size: 128px;
    }
    @media (max-width: 1000px){
        :root {
            --title-size: 64px;
        }
    }
    
    body {
        margin: 0;
    }

    h1 {
        background-color: black;
        color: white;
        padding-top: 100px;
        margin: -25px;
        font-size: var(--title-size);
        font-family: Georgia;
        text-align: center;
    }

    .main-container {
        width: auto;
        display: grid;
        grid-template-areas: 
        "head"
        "body"
        "footer";
    }

    .arts-container {
        grid-area: body;
        display: flex;
        flex-wrap: wrap;
        margin: 50px 25px 25px 25px;
        justify-content: center;
    }
    /*for grid only
    .arts-container:has(.imgformat:nth-child(1):hover) {
        flex-grow: 2;
        
    }*/

    .imgformat {
        display: flex;
        flex-direction: column;
        flex: 1 1 200px;
        align-items: center;
        transition: ease 0.5s;
    }

    .imgformat:hover {
        flex: 2 1 200px;
    }

    .imgformat img {
        width: 100%;
        height: 100%;
        object-fit:cover;
    }

    .imgformat span{
        position: absolute;
        z-index: 0;
        color:white;
        font-size: 15px;
        font-family: fantasy;
        white-space: nowrap;
        filter: drop-shadow(0.5px 1px black)
    }
</style>
<html>

</head>
